<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LETTO</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

h1{
color:gold;
font-size:50px;
margin-top:40px;
}

.subtitle{
margin-bottom:20px;
}

.letters{
display:flex;
justify-content:center;
gap:10px;
margin:20px;
}

.letter{
width:55px;
height:55px;
border:3px solid gold;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
}

button{
background:gold;
border:none;
padding:15px 30px;
font-size:20px;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>LETTO</h1>
<div class="subtitle">Ultra Casino Edition</div>

<div class="letters">
<div class="letter">?</div>
<div class="letter">?</div>
<div class="letter">?</div>
<div class="letter">?</div>
<div class="letter">?</div>
<div class="letter">?</div>
</div>

<button onclick="spin()">PLAY / REPLAY</button>

<p>Clique SPIN</p>

<script>

function spin(){

const alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const letters=document.querySelectorAll(".letter");

letters.forEach(l=>{
l.textContent=alphabet[Math.floor(Math.random()*alphabet.length)];
});

}

</script>

</body>
</html>
