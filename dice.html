<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ALPHAZARD - Dice</title>

<style>
body {
    background: black;
    color: gold;
    font-family: Arial;
    text-align: center;
    padding-top: 50px;
}

h1 {
    font-size: 40px;
}

.dice {
    font-size: 120px;
    margin: 20px;
    padding: 30px;
    border-radius: 20px;
    display: inline-block;
    min-width: 120px;
    text-align: center;
    box-shadow: 0 0 20px gold;
    transition: 0.2s;
}
    .dice {
  transition: all 0.3s ease;
}

.dice.active {
  animation: glowPulse 0.6s ease;
}
    .roll {
    animation: shake 0.3s;
      
    @keyframes glowPulse {
  0% {
    box-shadow: 0 0 10px #ffd700;
    transform: scale(1);
  }
  50% {
    box-shadow: 0 0 25px #ffd700;
    transform: scale(1.1);
  }
  100% {
    box-shadow: 0 0 10px #ffd700;
    transform: scale(1);
  }
}

@keyframes shake {
    0% { transform: scale(1); }
    50% { transform: scale(1.3) rotate(10deg); }
    100% { transform: scale(1); }
}
#consonnes {
    display: flex;
    justify-content: center;
    gap: 15px;
}
#voyelle {
    background: yellow;
    color: black;
    font-weight: bold;
    text-shadow: 0 0 10px black;
}
#consonne {
    background: lightblue;
    color: black;
}

#voyelle {
    color: yellow;
}

#consonne {
    color: lightblue;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    background: gold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🎲 ALPHAZARD DICE</h1>

<div class="dice" id="voyelle">?</div>

<div id="consonnes">
    <div class="dice c">?</div>
    <div class="dice c">?</div>
    <div class="dice c">?</div>
    <div class="dice c">?</div>
</div>

<button onclick="roll()">LANCER</button>
    <button onclick="verifier()">VALIDER</button>
    <div style="margin-top:20px;">
  <input id="mot" type="text" placeholder="Tape ton mot"
         style="padding:12px; font-size:20px; border-radius:10px; border:none; text-align:center;">
</div>
    <div id="resultat" style="margin-top:20px; font-size:24px;"></div>
    <div id="score">Score : 0</div>

<script>

document.addEventListener("DOMContentloaded",
                          let tirages = [];
    
    let score = 0
    // Voyelles (D6)
const voyelles = ["A", "E", "I", "O", "U", "Y"];

// Consonnes (D20)
const consonnes = [
  "B","C","D","F","G","H","J","K","L","M",
  "N","P","Q","R","S","T","V","W","X","Z"
];

// Tirage aléatoire
function tirerLettre(tableau) {
  return tableau[Math.floor(Math.random() * tableau.length)];
}

// Tirage complet
function tirage() {
  const voyelle = tirerLettre(voyelles);

  // Exemple : 4 consonnes
  const tirageConsonnes = [];
  for (let i = 0; i < 4; i++) {
    tirageConsonnes.push(tirerLettre(consonnes));
  }

  return [voyelle, ...tirageConsonnes];
}

// Exemple d'utilisation
console.log(tirage());function tirageSansDoublon() {
  const voyelle = tirerLettre(voyelles);

  // copie du tableau pour éviter répétition
  let pool = [...consonnes];
  let tirageConsonnes = [];

  for (let i = 0; i < 4; i++) {
    let index = Math.floor(Math.random() * pool.length);
    tirageConsonnes.push(pool[index]);
    pool.splice(index, 1); // retire la lettre
  }

  return [voyelle, ...tirageConsonnes];
}
    
const voyelles = ["A","E","I","O","U","Y"];
const consonnes = [
"B","C","D","F","G","H","J","K","L","M",
"N","P","Q","R","S","T","V","W","X","Z"
];
   function roll() {

    if (tirages.length >= 3) {
        alert("Max 3 lancers !");
        return;
    }

    let duration = 800;
    let interval = 80;

    let animation = setInterval(() => {

        let v = voyelles[Math.floor(Math.random()*voyelles.length)];
        document.getElementById("voyelle").innerText = v;

        let cases = document.querySelectorAll(".c");
        cases.forEach(el => {
            el.innerText = consonnes[Math.floor(Math.random()*consonnes.length)];
        });

    }, interval);

    setTimeout(() => {

        clearInterval(animation);

        let v = voyelles[Math.floor(Math.random()*voyelles.length)];
        let c = consonnes[Math.floor(Math.random()*consonnes.length)];

        tirages.push({v, c});

        afficherDes();

    }, duration);
}
    function afficherDes() {

    let voyelleHTML = "";
    let consonnesHTML = "";

    tirages.forEach(t => {
        voyelleHTML += `<div class="dice">${t.v}</div>`;
        consonnesHTML += `<div class="dice">${t.c}</div>`;
    });

    document.getElementById("voyelle").innerHTML = voyelleHTML;
    document.getElementById("consonnes").innerHTML = consonnesHTML;
}
 function verifier() {

    let mot = document.getElementById("mot").value.toUpperCase();

    let lettres = [];
    let v = document.getElementById("voyelle").innerText;
    if (v !== "?") lettres.push(v);

    document.querySelectorAll(".c").forEach(el => {
        let c = el.innerText;
        if (c !== "?") lettres.push(c);
    });

    let copie = [...lettres];
    let valide = true;

    for (let l of mot) {
        let index = copie.indexOf(l);
        if (index === -1) {
            valide = false;
            break;
        }
        copie.splice(index, 1);
    }

    let res = document.getElementById("resultat");

    if (valide && mot.length > 0) {
        score += mot.length;
        document.getElementById("score").innerText = "Score : " + score;
        res.innerText = "✅ Mot valide";
        res.style.color = "lightgreen";
    } else {
        res.innerText = "❌ Mot invalide";
        res.style.color = "red";
        
    }
}
    }

console.log("JS chargé");

</script>
      
</script>
</body>
</html>
