<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ALPHAZARD DICE</title>

<style>
body {
  background: black;
  color: gold;
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 40px;
}

h1 {
  font-size: 42px;
  text-shadow: 0 0 15px gold;
}

.zone {
  margin: 30px auto;
}

.dice {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 110px;
  height: 110px;
  margin: 10px;
  border: 3px solid gold;
  border-radius: 18px;
  font-size: 60px;
  color: gold;
  box-shadow: 0 0 20px gold;
}

button {
  background: gold;
  color: black;
  border: none;
  padding: 12px 25px;
  margin: 8px;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

input {
  padding: 12px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

#score, #resultat {
  margin-top: 15px;
  font-size: 22px;
}
</style>
</head>

<body>

<h1>🎲 ALPHAZARD DICE</h1>

<div class="zone">
  <div id="voyelles"></div>
  <div id="consonnes"></div>
</div>

<button onclick="roll()">LANCER</button>
<button onclick="verifier()">VALIDER</button>
<button onclick="resetGame()">RESET</button>

<br><br>

<input id="mot" type="text" placeholder="Tape ton mot">

<div id="resultat"></div>
<div id="score">Score : 0</div>

<script>
let score = 0;
let tirages = [];

const voyelles = ["A", "E", "I", "O", "U", "Y"];
const consonnes = ["B","C","D","F","G","H","J","K","L","M","N","P","Q","R","S","T","V","W","X","Z"];

function tirer(tableau) {
  return tableau[Math.floor(Math.random() * tableau.length)];
}

function roll() {
  if (tirages.length >= 3) {
    alert("Maximum 3 lancers !");
    return;
  }

  const v = tirer(voyelles);
  let consonnesTirees = [];

for (let i = 0; i < 4; i++) {
  consonnesTirees.push(tirer(consonnes));
}

tirages.push({ v, c: consonnesTirees });
  afficher();
}

function afficher() {
  const voyellesZone = document.getElementById("voyelles");
  const consonnesZone = document.getElementById("consonnes");

  // Voyelles
  voyellesZone.innerHTML = tirages
    .map(t => `<div class="dice">${t.v}</div>`)
    .join("");

  // Consonnes (PLUSIEURS par tirage)
  consonnesZone.innerHTML = tirages
    .map(t =>
      t.c.map(c => `<div class="dice">${c}</div>`).join("")
    )
    .join("");
}

function verifier() {
  const mot = document.getElementById("mot").value.toUpperCase();
  const resultat = document.getElementById("resultat");

  let lettres = [];
  tirages.forEach(t => {
    lettres.push(t.v);
    lettres.push(t.c);
  });

  let copie = [...lettres];
  let valide = true;

  for (let lettre of mot) {
    let index = copie.indexOf(lettre);
    if (index === -1) {
      valide = false;
      break;
    }
    copie.splice(index, 1);
  }

  if (valide && mot.length > 0) {
    score += mot.length;
    document.getElementById("score").innerText = "Score : " + score;
    resultat.innerText = "✅ Mot valide";
    resultat.style.color = "lightgreen";
  } else {
    resultat.innerText = "❌ Mot invalide";
    resultat.style.color = "red";
  }
}

function resetGame() {
  tirages = [];
  document.getElementById("voyelles").innerHTML = "";
  document.getElementById("consonnes").innerHTML = "";
  document.getElementById("mot").value = "";
  document.getElementById("resultat").innerText = "";
}
</script>

</body>
</html>
