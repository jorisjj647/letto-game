<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ALPHAZARD DICE</title>

<style>
body {
  background: black;
  color: gold;
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 40px;
}

h1 {
  font-size: 42px;
  text-shadow: 0 0 15px gold;
}

.zone {
  margin: 30px auto;
}

.dice {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 110px;
  height: 110px;
  margin: 10px;
  border: 3px solid gold;
  border-radius: 18px;
  font-size: 60px;
  color: gold;
  box-shadow: 0 0 20px gold;
}

button {
  background: gold;
  color: black;
  border: none;
  padding: 12px 25px;
  margin: 8px;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

input {
  padding: 12px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

#score, #resultat {
  margin-top: 15px;
  font-size: 22px;
}
  .de.rolling {
  animation: diceRoll 0.6s ease;
}

@keyframes diceRoll {
  0% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(12deg) scale(1.08); }
  50% { transform: rotate(-12deg) scale(1.15); }
  75% { transform: rotate(8deg) scale(1.08); }
  100% { transform: rotate(0deg) scale(1); }
}
  .de {
  animation: pop 0.3s ease;
}

@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

#historique {
  margin-top: 20px;
  font-size: 22px;
  color: gold;
  text-shadow: 0 0 10px gold;
}
</style>
</head>

<body>

<h1>🎲 ALPHAZARD DICE</h1>
  <div id="zoneDes">
  <div class="de" id="deVoyelle">?</div>
  <div class="de" id="deConsonne">?</div>
</div>

<div id="historique"></div>

<button onclick="roll()">LANCER</button>
<button onclick="verifier()">VALIDER</button>
<button onclick="resetGame()">RESET</button>



<input id="mot" type="text" placeholder="Tape ton mot">

<div id="resultat"></div>
<div id="score">Score : 0</div>

<script>
let score = 0;
let tirages = [];
  let lettres = [];
  let nbLancers = 0;
  let maxLancers = 3;
  let dejaValide = false;

const voyelles = ["A", "E", "I", "O", "U", "Y"];
const consonnes = ["B","C","D","F","G","H","J","K","L","M","N","P","Q","R","S","T","V","W","X","Z"];

function tirer(tableau) {
  return tableau[Math.floor(Math.random() * tableau.length)];
}

function roll() {
  if (nbLancers >= maxLancers) {
    alert("Maximum 3 lancers !");
    return;
  }
  if (nbLancers === maxLancers) {
  document.getElementById("resultat").innerHTML += "<br>⚠️ Dernier lancer !";
}

  dejaValide = false;
  nbLancers++;

  tirages = []; // IMPORTANT → on remplace à chaque lancer

  const voyelles = ["A","E","I","O","U","Y"];
  const consonnes = [
    "B","C","D","F","G","H","J","K","L","M",
    "N","P","Q","R","S","T","V","W","X","Z"
  ];

  // 2 voyelles + 5 consonnes = jouable
  for (let i = 0; i < 2; i++) {
    tirages.push(voyelles[Math.floor(Math.random() * voyelles.length)]);
  }

  for (let i = 0; i < 5; i++) {
    tirages.push(consonnes[Math.floor(Math.random() * consonnes.length)]);
  }

  afficherLettres();
}
  function afficherHistorique() {
  document.getElementById("historique").innerText = lettres.join(" ");
}

function afficherLettres() {
  const zone = document.getElementById("zoneDes");
  zone.innerHTML = "";

  tirages.forEach(l => {
    let d = document.createElement("div");
    d.className = "de";
    d.innerText = l;
    zone.appendChild(d);
  });
}

function verifier() {
  if (dejaValide) return;
  document.getElementById("resultat").innerHTML = "✅ +" + mot.length + " points";

  let mot = document.getElementById("mot").value.toUpperCase();

  if (mot.length < 3) {
    document.getElementById("resultat").innerHTML = "❌ Mot trop court";
    return;
  }

  score += mot.length;
  document.getElementById("score").innerText = "Score : " + score;

  dejaValide = true;
}

function resetGame() {
  tirages = [];
  nbLancers = 0;
  dejaValide = false;

  document.getElementById("zoneDes").innerHTML = "";
  document.getElementById("mot").value = "";
  document.getElementById("resultat").innerHTML = "";
}
</script>

</body>
</html>
