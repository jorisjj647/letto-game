<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ALPHAZARD - Dice</title>

<style>
body {
    background: black;
    color: gold;
    font-family: Arial;
    text-align: center;
    padding-top: 50px;
}

h1 {
    font-size: 40px;
}

.dice {
    font-size: 120px;
    margin: 20px;
    padding: 30px;
    border-radius: 20px;
    display: inline-block;
    min-width: 120px;
    text-align: center;
    box-shadow: 0 0 20px gold;
    transition: 0.2s;
}
#consonnes {
    display: flex;
    justify-content: center;
    gap: 15px;
}
#voyelle {
    background: yellow;
    color: black;
    font-weight: bold;
    text-shadow: 0 0 10px black;
}
#consonne {
    background: lightblue;
    color: black;
}

#voyelle {
    color: yellow;
}

#consonne {
    color: lightblue;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    background: gold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🎲 ALPHAZARD DICE</h1>

<div class="dice" id="voyelle">?</div>

<div id="consonnes">
    <div class="dice c">?</div>
    <div class="dice c">?</div>
    <div class="dice c">?</div>
    <div class="dice c">?</div>
</div>

<button onclick="roll()">LANCER</button>

<script>
const voyelles = ["A","E","I","O","U","Y"];

const consonnes = [
"B","C","D","F","G","H","J","K","L","M",
"N","P","Q","R","S","T","V","W","X","Z"
];

function roll() {
    // voyelle
    let v = voyelles[Math.floor(Math.random()*voyelles.length)];
    document.getElementById("voyelle").innerText = v;

    // 4 consonnes
    let cases = document.querySelectorAll(".c");

    cases.forEach(el => {
        let c = consonnes[Math.floor(Math.random()*consonnes.length)];
        el.innerText = c;
    });
}
</script>

</body>
</html>
