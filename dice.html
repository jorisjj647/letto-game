<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ALPHAZARD - Dice</title>

<style>
body {
    background: black;
    color: gold;
    font-family: Arial;
    text-align: center;
    padding-top: 50px;
}

h1 {
    font-size: 40px;
}

.dice {
    font-size: 120px;
    margin: 20px;
    padding: 30px;
    border-radius: 20px;
    display: inline-block;
    min-width: 120px;
    text-align: center;
    box-shadow: 0 0 20px gold;
    transition: 0.2s;
}
    .dice {
  transition: all 0.3s ease;
}

.dice.active {
  animation: glowPulse 0.6s ease;
}
    .roll {
    animation: shake 0.3s;
      
    @keyframes glowPulse {
  0% {
    box-shadow: 0 0 10px #ffd700;
    transform: scale(1);
  }
  50% {
    box-shadow: 0 0 25px #ffd700;
    transform: scale(1.1);
  }
  100% {
    box-shadow: 0 0 10px #ffd700;
    transform: scale(1);
  }
}

@keyframes shake {
    0% { transform: scale(1); }
    50% { transform: scale(1.3) rotate(10deg); }
    100% { transform: scale(1); }
}
#consonnes {
    display: flex;
    justify-content: center;
    gap: 15px;
}
#voyelle {
    background: yellow;
    color: black;
    font-weight: bold;
    text-shadow: 0 0 10px black;
}
#consonne {
    background: lightblue;
    color: black;
}

#voyelle {
    color: yellow;
}

#consonne {
    color: lightblue;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    background: gold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🎲 ALPHAZARD DICE</h1>

<div class="dice" id="voyelle">?</div>

<div id="consonnes">
    <div class="dice c">?</div>
    <div class="dice c">?</div>
    <div class="dice c">?</div>
    <div class="dice c">?</div>
</div>

<button onclick="roll()">LANCER</button>
    <button onclick="verifier()">VALIDER</button>
    <div style="margin-top:20px;">
  <input id="mot" type="text" placeholder="Tape ton mot"
         style="padding:12px; font-size:20px; border-radius:10px; border:none; text-align:center;">
</div>
    <div id="resultat" style="margin-top:20px; font-size:24px;"></div>
    <div id="score">Score : 0</div>

<script>
let score = 0;
let tirages = [];

const voyelles = ["A", "E", "I", "O", "U", "Y"];
const consonnes = ["B","C","D","F","G","H","J","K","L","M","N","P","Q","R","S","T","V","W","X","Z"];

function tirer(tableau) {
  return tableau[Math.floor(Math.random() * tableau.length)];
}

window.roll = function() {
  if (tirages.length >= 3) {
    alert("Maximum 3 lancers !");
    return;
  }

  const v = tirer(voyelles);
  const c = tirer(consonnes);

  tirages.push({ v, c });

  afficher();
};

function afficher() {
  const voyelleZone = document.getElementById("voyelle");
  const consonnesZone = document.getElementById("consonnes");

  voyelleZone.innerHTML = tirages.map(t => `<div class="dice">${t.v}</div>`).join("");
  consonnesZone.innerHTML = tirages.map(t => `<div class="dice c">${t.c}</div>`).join("");
}

window.verifier = function() {
  const mot = document.getElementById("mot").value.toUpperCase();
  const resultat = document.getElementById("resultat");

  let lettres = [];

  tirages.forEach(t => {
    lettres.push(t.v);
    lettres.push(t.c);
  });

  let copie = [...lettres];
  let valide = true;

  for (let lettre of mot) {
    let index = copie.indexOf(lettre);
    if (index === -1) {
      valide = false;
      break;
    }
    copie.splice(index, 1);
  }

  if (valide && mot.length > 0) {
    score += mot.length;
    document.getElementById("score").innerText = "Score : " + score;
    resultat.innerText = "✅ Mot valide";
    resultat.style.color = "lightgreen";
  } else {
    resultat.innerText = "❌ Mot invalide";
    resultat.style.color = "red";
  }
};

window.resetGame = function() {
  tirages = [];
  document.getElementById("voyelle").innerHTML = "?";
  document.getElementById("consonnes").innerHTML = "";
  document.getElementById("mot").value = "";
  document.getElementById("resultat").innerText = "";
};
</script>
</body>
</html>
