<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LETTO</title>

<style>
body {
  margin:0;
  background:#090b10;
  color:white;
  font-family:Arial;
  text-align:center;
}
  #scoreBox {
  margin-top: 10px;
  font-size: 22px;
  color: gold;
  font-weight: bold;
}

h1 {
  color:gold;
  margin-top:40px;
}

.box {
  display:inline-block;
  width:60px;
  height:60px;
  border:2px solid gold;
  border-radius:10px;
  margin:10px;
  font-size:30px;
  line-height:60px;
}

button {
  margin-top:20px;
  padding:15px 30px;
  background:gold;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>LETTO</h1>
  <div id="scoreBox">
  SCORE : <span id="score">0</span>
</div>

<div id="letters"></div>

<button onclick="roll()">RELANCER</button>

<script>
let score = 0;

function roll(){
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const container = document.getElementById("letters");

    container.innerHTML = "";

    for(let i=0;i<6;i++){
        const letter = alphabet[Math.floor(Math.random()*alphabet.length)];

        const div = document.createElement("div");
        div.className="box";
        div.textContent=letter;

        container.appendChild(div);
    }

    let gain = 0;

for(let i=0;i<6;i++){
    const letter = alphabet[Math.floor(Math.random()*alphabet.length)];

    const div = document.createElement("div");
    div.className="box";
    div.textContent=letter;

    // 👉 logique score
    if("AEIOUY".includes(letter)){
        gain += 5; // voyelle
    } else {
        gain += 2; // consonne
    }

    container.appendChild(div);
}

score += gain;
    document.getElementById("score").textContent = score;
}
</script>

</body>
</html>
