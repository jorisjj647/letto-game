<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content=
  
  "width=device-width, initial-scale=1.0">
<title>LETTO</title>

<style>
body {
  margin:0;
  background:#090b10;
  color:white;
  font-family:Arial;
  text-align:center;
}
  #message {
    margin-top: 10px;
    font-size: 18px;
    color: gold;
}
 #message {
  color: #ff4fb8;
  font-size: 28px;
  font-weight: bold;
  margin: 14px 0;
  text-shadow: 0 0 16px #ff4fb8;
}
  #scoreBox {
  margin-top: 10px;
  font-size: 22px;
  color: gold;
  font-weight: bold;
}
  #subtitle {
    color: #aaa;
    margin-bottom: 20px;
    font-size: 16px;
  }

h1 {
  color:gold;
  margin-top:40px;
}

.box {
  display:inline-block;
  width:60px;
  height:60px;
  border:2px solid gold;
  border-radius:10px;
  margin:10px;
  font-size:30px;
  line-height:60px;
  
  transition: 0.2s;
cursor:pointer;
}
  .box:hover{
transform: scale(1.12);
box-shadow: 0 0 20px gold;
}

button {
  margin-top:20px;
  padding:15px 30px;
  background:gold;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}
  #playerName {
  margin: 10px auto 18px auto;
  padding: 14px 18px;
  border-radius: 12px;
  border: none;
  font-size: 18px;
  text-align: center;
  width: 220px;
}
  #victoryScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.92);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#victoryText{
color:gold;
font-size:48px;
text-align:center;
text-shadow:0 0 25px gold;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<h1>LETTO</h1>
  <p id="playerDisplay"></p>
  <p id="subtitle">Jusqu’où peux-tu aller ?</p>
  <input id="playerName" placeholder="Ton pseudo..." oninput="updatePlayer()" />
  <input id="player2Name" placeholder="Pseudo joueur 2..." />
  <div id="turnDisplay">Tour de : Joueur 1</div>
 <div id="scoreBox">
  🥇 Joueur 1 : <span id="score1">0</span><br>
  🥈 Joueur 2 : <span id="score2">0</span>
</div>
  <div id="message">Entre les pseudos puis clique RELANCER</div>

<div id="letters"></div>

<button onclick="roll()">RELANCER</button>
  <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
let score1 = 0;
let score2 = 0;
  let currentPlayer = 1;
  let turns1 = 0;
let turns2 = 0;

function roll(){
  const playerTurn = currentPlayer;
  const player = document.getElementById("playerName").value;
  let currentName = "";

if(currentPlayer === 1){
  currentName = document.getElementById("playerName").value || "Joueur 1";
} else {
  currentName = document.getElementById("player2Name").value || 
  "Joueur 2";
}
  
 
}
  const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const container = document.getElementById("letters");
  const scoreEl = document.getElementById("score");
  const messageBox = document.getElementById("message");

  container.innerHTML = "";

  let gain = 0;
  let letters = [];
  let message = "";

  for(let i = 0; i < 6; i++){
    setTimeout(() => {
      const letter = alphabet[Math.floor(Math.random() * alphabet.length)];
      letters.push(letter);

      const div = document.createElement("div");
      div.className = "box";
      div.textContent = letter;
      div.style.opacity = "0";
      div.style.transform = "scale(0.5)";
      container.appendChild(div);

      setTimeout(() => {
        div.style.transition = "all 0.3s ease";
        div.style.opacity = "1";
        div.style.transform = "scale(1)";
      }, 50);

      if("AEIOUY".includes(letter)){
        gain += 5;
      } else {
        gain += 2;
      }

      if(i === 5){
        const counts = {};
        letters.forEach(l => counts[l] = (counts[l] || 0) + 1);

        for(let l in counts){
          if(counts[l] >= 3){
            gain += 50;
            message = "🔥 SUPER COMBO !";
          }
        }

        for(let j = 0; j < letters.length - 1; j++){
          if(letters[j] === letters[j+1]){
            gain += 2;
            if(!message) message = "✨ DOUBLE !";
          }
        }

if(currentPlayer === 1){
  score1 += gain;
  turns1++;
} else {
  score2 += gain;
  turns2++;
}
        document.getElementById("score1").textContent = score1;
document.getElementById("score2").textContent = score2;

        if(messageBox){
          messageBox.textContent = message || ("+" + gain + " points");
          function updatePlayer(){
  const player = document.getElementById("playerName").value;
  document.getElementById("playerDisplay").textContent = "Joueur : " + player;
}
        }
      }
    }, i * 200);
  }
  document.getElementById("turnDisplay").textContent = "Tour de : " + currentName;
  if(currentPlayer === 1){
  currentPlayer = 2;
} else {
  currentPlayer = 1;
}
}
</script>
  <div id="victoryScreen" style="display:none;">
  <h2 id="victoryText"></h2>
</div>
  
</body>
</html>
