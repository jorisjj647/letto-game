<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content=
  
  "width=device-width, initial-scale=1.0">
<title>LETTO</title>

<style>
body {
  margin:0;
  background:#090b10;
  color:white;
  font-family:Arial;
  text-align:center;
}
  #message {
    margin-top: 10px;
    font-size: 18px;
    color: gold;
}
  #scoreBox {
  margin-top: 10px;
  font-size: 22px;
  color: gold;
  font-weight: bold;
}
  #subtitle {
    color: #aaa;
    margin-bottom: 20px;
    font-size: 16px;
  }

h1 {
  color:gold;
  margin-top:40px;
}

.box {
  display:inline-block;
  width:60px;
  height:60px;
  border:2px solid gold;
  border-radius:10px;
  margin:10px;
  font-size:30px;
  line-height:60px;
}

button {
  margin-top:20px;
  padding:15px 30px;
  background:gold;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>LETTO</h1>
  <p id="subtitle">Forme un mot avec ces lettres</p>
  <div id="scoreBox">
  SCORE : <span id="score">0</span>
</div>
  <div id="message"></div>

<div id="letters"></div>

<button onclick="roll()">RELANCER</button>
  <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
let score = 0;

function roll(){
  const sound = document.getElementById("clickSound");
  if(sound){
    sound.currentTime = 0;
    sound.play().catch(() => {});
  }

  const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const container = document.getElementById("letters");
  container.innerHTML = "";

  let gain = 0;
  let message = "";
  let letters = [];

 for(let i = 0; i < 6; i++){

  setTimeout(() => {

    const letter = alphabet[Math.floor(Math.random()*alphabet.length)];
    letters.push(letter);

    const div = document.createElement("div");
    div.className = "box";
    div.textContent = letter;

    // effet apparition
    div.style.opacity = "0";
    div.style.transform = "scale(0.5)";

    container.appendChild(div);

    setTimeout(() => {
      div.style.transition = "all 0.3s ease";
      div.style.opacity = "1";
      div.style.transform = "scale(1)";
    }, 50);

    // score
    if("AEIOUY".includes(letter)){
      gain += 5;
    } else {
      gain += 2;
    }

  }, i * 200); // vitesse apparition
}
  setTimeout(() => {
  score += gain;
  document.getElementById("score").textContent = score;
}, 1300);

  const counts = {};
  letters.forEach(l => counts[l] = (counts[l] || 0) + 1);

  for(let l in counts){
    if(counts[l] >= 3){
  gain += 50;
  message = "🔥 SUPER COMBO !";
}
  }
  // ✨ DOUBLE LETTRE
for(let i = 0; i < letters.length - 1; i++){
  if(letters[i] === letters[i+1]){
  gain += 2;
  message = "✨ DOUBLE !";
}

  score += gain;
  document.getElementById("score").textContent = score;
  document.getElementById("message").textContent = message || ("+" + gain + " points");
}
</script>
</body>
</html>
