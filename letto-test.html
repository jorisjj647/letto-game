<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LETTO</title>

<style>
body {
  margin:0;
  background:radial-gradient(circle at top, #1a1f2b 0%, #090b10 100%);
  color:white;
  font-family:Arial;
  text-align:center;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  background:#121722;
  padding:40px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,215,0,0.1);
}

h1 {
  color:gold;
  margin-bottom:20px;
}

.box {
  display:inline-block;
  width:60px;
  height:60px;
  border:2px solid gold;
  border-radius:10px;
  margin:10px;
  font-size:30px;
  line-height:60px;
}

button {
  margin-top:20px;
  padding:15px 30px;
  background:gold;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>LETTO</h1>
  <div id="letters"></div>
  <button onclick="roll()">RELANCER</button>
</div>

<script>
function roll(){
  const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const container = document.getElementById("letters");
  container.innerHTML = "";

  for(let i=0;i<6;i++){
    const letter = alphabet[Math.floor(Math.random()*alphabet.length)];
    const div = document.createElement("div");
    div.className="box";
    div.textContent=letter;
    container.appendChild(div);
  }
}

roll();
</script>

</body>
</html>
